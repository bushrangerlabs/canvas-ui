<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }
    #card-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="card-container"></div>
  
  <script type="module">
    // Wait for message from parent with card configuration
    window.addEventListener('message', async (event) => {
      // Only accept messages from same origin
      if (event.origin !== window.location.origin) return;
      
      const { action, cardConfig } = event.data;
      
      if (action === 'CREATE_CARD') {
        const container = document.getElementById('card-container');
        container.innerHTML = ''; // Clear previous card
        
        try {
          // Get hass object from parent
          const hass = window.parent.hass || window.hass;
          if (!hass) {
            console.error('[Lovelace Helper] No hass object available');
            window.parent.postMessage({ action: 'CARD_ERROR', error: 'No hass connection' }, '*');
            return;
          }
          
          let cardElement = null;
          
          // Try using card helpers (works for built-in cards)
          if (window.loadCardHelpers) {
            try {
              const helpers = await window.loadCardHelpers();
              if (helpers?.createCardElement) {
                cardElement = await helpers.createCardElement(cardConfig);
                cardElement.hass = hass;
                container.appendChild(cardElement);
                window.parent.postMessage({ action: 'CARD_CREATED' }, '*');
                
                // Update hass when it changes in parent
                const updateHass = () => {
                  const newHass = window.parent.hass || window.hass;
                  if (cardElement && newHass) {
                    cardElement.hass = newHass;
                  }
                };
                
                // Poll for hass updates
                setInterval(updateHass, 1000);
                return;
              }
            } catch (err) {
              console.error('[Lovelace Helper] Card helpers failed:', err);
            }
          }
          
          // Fallback: try direct element creation (for custom cards)
          const cardType = cardConfig.type || 'entities';
          const normalizedType = cardType.startsWith('hui-') ? cardType : `custom:${cardType}`.replace('custom:custom:', 'custom:');
          
          cardElement = document.createElement(normalizedType);
          cardElement.hass = hass;
          container.appendChild(cardElement);
          
          // Poll for setConfig
          let attempts = 0;
          const pollForSetConfig = () => {
            attempts++;
            if (typeof cardElement.setConfig === 'function') {
              try {
                cardElement.setConfig(cardConfig);
                window.parent.postMessage({ action: 'CARD_CREATED' }, '*');
                
                // Update hass periodically
                setInterval(() => {
                  const newHass = window.parent.hass || window.hass;
                  if (cardElement && newHass) {
                    cardElement.hass = newHass;
                  }
                }, 1000);
              } catch (err) {
                window.parent.postMessage({ action: 'CARD_ERROR', error: err.message }, '*');
              }
            } else if (attempts < 50) {
              setTimeout(pollForSetConfig, 100);
            } else {
              window.parent.postMessage({ action: 'CARD_ERROR', error: 'Card not loaded' }, '*');
            }
          };
          setTimeout(pollForSetConfig, 100);
          
        } catch (err) {
          console.error('[Lovelace Helper] Error:', err);
          window.parent.postMessage({ action: 'CARD_ERROR', error: err.message }, '*');
        }
      }
    });
    
    // Signal ready
    window.parent.postMessage({ action: 'HELPER_READY' }, '*');
  </script>
</body>
</html>
